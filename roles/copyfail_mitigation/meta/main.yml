---
galaxy_info:
  author: Moustafa Harbi - mharbi@redhat.com
  description: >-
    Applies or rolls back the Linux CopyFail (CVE-2026-31431) mitigation
    (initcall_blacklist=algif_aead_init) on Red Hat-like, Debian-like, and SUSE
    distributions with preflight checks for required bootloader tools.
  license: GPL-3.0-only
  min_ansible_version: "2.13"
  platforms:
    - name: EL
      versions:
        - "8"
        - "9"
        - "10"
    - name: Fedora
      versions:
        - all
    - name: Ubuntu
      versions:
        - all
    - name: Debian
      versions:
        - all
    - name: opensuse
      versions:
        - all
    - name: SLES
      versions:
        - all
    - name: Amazon
      versions:
        - all
dependencies: []
