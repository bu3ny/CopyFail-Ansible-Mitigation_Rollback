---
# Pair: playbook-coalesce-mitigate.yml — see collection README for all six example playbooks.
# Roll back CopyFail + Dirty Frag with a single coalesced reboot.
- name: Roll back CopyFail and Dirty Frag mitigations (coalesced reboot)
  hosts: all
  gather_facts: false
  become: true
  collections:
    - bu3ny.mitigation
  vars:
    mitigation_coalesce_reboot: true
    mitigation_coalesced_reboot_message: "Reboot: combined CopyFail and Dirty Frag rollback"
    copyfail_mitigation_state: absent
    dirtyfrag_mitigation_state: absent
  roles:
    - role: bu3ny.mitigation.mitigation_coalesce_reboot
    - role: bu3ny.mitigation.copyfail_mitigation
    - role: bu3ny.mitigation.dirtyfrag_mitigation
  post_tasks:
    - name: Flush reboot and verification handlers once for both roles
      ansible.builtin.meta: flush_handlers
      when: mitigation_coalesce_reboot | default(false)
